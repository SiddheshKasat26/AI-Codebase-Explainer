<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>

    <!--
      marked.js — converts Markdown text into HTML
      The AI responds with markdown (** for bold, ``` for code blocks etc.)
      marked.parse() will turn that into proper HTML for us
      We load it from a CDN (a public server) — no install needed!
    -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!--
      Link to our CSS file (we'll create this in B2)
      rel="stylesheet" tells the browser what kind of file it is
      href="style.css" is the path — same folder as index.html
    -->
    <link rel="stylesheet" href="style.css" />

</head>
<body>

    <!-- HEADER -->
    <!-- Contains: title, subtitle, feature badges -->
    <!-- Badges give users a quick overview of what the tool does before they use it -->

    <header class="site-header">

        <h1>🔍 AI Code Reviewer</h1>
        <p class="subtitle">
            Paste your code and get a deep senior-engineer-level review
        </p>

        <!--
        Badges — small pills showing the 8 main features
        class="badges" → we'll style this as a flex row in CSS
        Each <span> is one badge
        -->

        <div class="badges">
            <span class="badge">🧠 Summary</span>
            <span class="badge">❌ Bugs</span>
            <span class="badge">⚠️ Edge Cases</span>
            <span class="badge">🚀 Optimizations</span>
            <span class="badge">🛡️ Best Practices</span>
            <span class="badge">🔧 Fixed Code</span>
            <span class="badge">📊 Complexity</span>
            <span class="badge">🔍 Confidence Score</span>
        </div>

    </header>

    <!-- MAIN CONTENT -->
    <!-- Everything the user interacts with lives here -->

    <main class="container">

        <!-- INPUT SECTION -->
        <!-- Where the user pastes their code -->
        <!-- class="card" → we'll style cards as rounded boxes -->
        <section class="card input-section">

            <label for="code-input">PASTE YOUR CODE</label>

            <!--
            oninput="onCodeInput()" means:
            "Every time the user types something,
            run the onCodeInput() function in app.js"
            This gives us LIVE updates (char counter, language detection)
            without the user having to click anything
            -->

            <textarea 
            id="code-input"
            placeholder="// Paste any code here for a deep review...
function example(data) {
  for (var i = 0; i <= data.length; i++) {
    console.log(data[i].name)
  }
}"
            oninput="onCodeInput()"
            ></textarea>

            <!--
            Counter row — sits below the textarea
            Left side: live language detection ("Detected: Python")
            Right side: character count ("234 / 5000")
            -->

            <div class="counter-row">
                <span id="lang-detect">Waiting for code...</span>
                <span id="char-counter">0 / 5000</span>
            </div>

            <!--
            Error message box
            Hidden by default (display:none in CSS)
            app.js will show it if something goes wrong
            -->
            <div id="error-msg" class="error-msg"></div>

            <!--
            The main CTA (Call To Action) button
            onclick="runReview()" → calls our main JS function
            -->
            <button id="review-btn" class="btn-primary" onclick="runReview()">
                🔍 Run Deep Code Review
            </button>

        </section>

        <!-- LOADING STATE -->
        <!-- Shown while waiting for AI response -->
        <!-- Hidden by default — app.js toggles it -->
        <div id="loading" class="loading">
            <!--
            The spinner is just a div styled with CSS
            It has no content — CSS will make it spin
            We'll do that with @keyframes animation in style.css
            -->
            <div class="loading-inner">
                <div class="spinner"></div>
                <span>Senior engineer is reviewing your code...</span>
            </div>
        </div>

        <!-- RESULT SECTION -->
        <!-- Hidden by default -->
        <!-- app.js fills each section card with AI content then makes this whole section visible -->
        <section id="result-section" class="result-section">
            
            <!-- Top bar: title + language badge + copy button -->
             <div class="result-topbar">

                <h2>📋 Review Report</h2>
                <div class="topbar-actions">
                    <!--
                    Language badge — e.g. "PYTHON" or "JAVASCRIPT"
                    app.js will set its text after detecting the language
                    -->
                    <span id="lang-badge" class="lang-badge"></span>

                    <!--
                    Copy button — copies full report text to clipboard
                    onclick calls copyReport() in app.js
                    -->
                    <button class="btn-copy" id="copy-btn" onclick="copyReport()">
                        📋 Copy Report
                    </button>
                </div>
             </div>

             <!--
             THE 8 REVIEW CARDS
             Each div = one section of the AI's review

             id="section-X"   → app.js finds each one and fills it with AI content
             class="review-card TYPE" → TYPE controls the left border color:
             info    = blue   (neutral sections)
             danger  = red    (bugs — serious!)
             warning = yellow (edge cases — be careful)
             success = green  (positive: fixes, best practices

             They start EMPTY — JavaScript fills them later
             -->

             <!-- Section 1: Code Summary — neutral info -->
             <div id="section-1" class="review-card info"></div>

             <!-- Section 2: Errors & Bugs — red, serious -->
             <div id="section-2" class="review-card danger"></div>

             <!-- Section 3: Edge Cases — yellow, caution -->
             <div id="section-3" class="review-card warning"></div>

             <!-- Section 4: Improvements — blue, helpful -->
             <div id="section-4" class="review-card info"></div>

             <!-- Section 5: Best Practices — green, positive -->
             <div id="section-5" class="review-card success"></div>

             <!-- Section 6: Fixed Code — green, positive -->
             <div id="section-6" class="review-card success"></div>

             <!-- Section 7: Complexity Analysis — blue, neutral -->
             <div id="section-7" class="review-card info"></div>

             <!-- Section 8: Confidence Score — blue, neutral -->
             <div id="section-8" class="review-card info"></div>

             <!-- Reset button at the bottom -->
             <button class="btn-secondary" onclick="tryAgain()">
               🔄 Review Another Snippet
             </button>

         </section>

    </main>

    <!--
    Our JavaScript file — loaded at the VERY BOTTOM of body
    WHY HERE? Because JS needs all the HTML above to exist first.
    If we put this in <head>, JS would run before the buttons
    and textareas exist — and crash trying to find them.
    -->
    <script src="app.js"></script>

</body>
</html>
